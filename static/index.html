<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字转语音 - Text to Speech</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>文字转语音</h1>
            <p class="subtitle">Microsoft Edge TTS 支持多种音色</p>
        </header>

        <main>
            <!-- Text Input Section -->
            <section class="input-section">
                <h2>输入文本</h2>
                <textarea
                    id="text-input"
                    placeholder="在此粘贴要转换的文本..."
                    rows="8"
                ></textarea>
                <div class="char-count">
                    <span id="char-count">0</span> 字符
                </div>
            </section>

            <!-- File Upload Section -->
            <section class="upload-section">
                <h2>上传文件</h2>
                <div id="drop-zone" class="drop-zone">
                    <div class="drop-zone-content">
                        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <p>拖放文件到此处，或点击选择</p>
                        <p class="file-types">支持 TXT, PDF, DOCX, MD</p>
                    </div>
                    <input type="file" id="file-input" accept=".txt,.pdf,.docx,.md" hidden>
                </div>
                <div id="file-info" class="file-info hidden">
                    <span id="file-name"></span>
                    <span id="file-size"></span>
                    <button id="clear-file" class="btn-small">清除</button>
                </div>
            </section>

            <!-- Controls Section -->
            <section class="controls-section">
                <div class="control-group">
                    <label for="voice-select">音色选择</label>
                    <select id="voice-select">
                        <option value="zh-CN-XiaoxiaoNeural">晓晓 (女声-年轻) [默认]</option>
                        <option value="zh-CN-XiaoyiNeural">小艺 (女声-童年)</option>
                        <option value="zh-CN-YunxiaNeural">云夏 (女声-年轻)</option>
                        <option value="zh-CN-YunxiNeural">云希 (男声-年轻)</option>
                        <option value="zh-CN-YunyangNeural">云扬 (男声-中年)</option>
                        <option value="zh-CN-YunjianNeural">云健 (男声-年轻)</option>
                        <option value="en-US-AriaNeural">Aria (女声-美式)</option>
                        <option value="en-US-GuyNeural">Guy (男声-美式)</option>
                        <option value="en-US-JennyNeural">Jenny (女声-美式)</option>
                        <option value="en-GB-SoniaNeural">Sonia (女声-英式)</option>
                        <option value="en-GB-RyanNeural">Ryan (男声-英式)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="speed-select">播放速度</label>
                    <select id="speed-select">
                        <option value="0.5">0.5x (很慢)</option>
                        <option value="0.75">0.75x (较慢)</option>
                        <option value="1.0" selected>1.0x (正常)</option>
                        <option value="1.25">1.25x (较快)</option>
                        <option value="1.5">1.5x (很快)</option>
                        <option value="2.0">2.0x (极快)</option>
                    </select>
                </div>
                <button id="convert-btn" class="btn btn-primary">
                    <span class="btn-text">转换为语音</span>
                    <span class="btn-loading hidden">
                        <span class="spinner"></span>
                        处理中...
                    </span>
                </button>
            </section>

            <!-- Conversion Progress Section -->
            <section id="convert-progress-section" class="convert-progress-section hidden">
                <div class="convert-progress-header">
                    <span>正在合成语音...</span>
                    <span id="convert-progress-text">0%</span>
                </div>
                <div class="convert-progress-bar">
                    <div id="convert-progress-fill" class="convert-progress-fill"></div>
                </div>
            </section>

            <!-- Audio Player Section -->
            <section id="player-section" class="player-section hidden">
                <h2>音频播放</h2>
                <div class="audio-info">
                    <span id="engine-used"></span>
                    <span id="voice-used"></span>
                </div>
                <div class="audio-controls">
                    <button id="play-btn" class="btn btn-play">
                        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                        <svg class="pause-icon hidden" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="4" width="4" height="16"/>
                            <rect x="14" y="4" width="4" height="16"/>
                        </svg>
                    </button>
                    <div id="audio-progress-bar" class="audio-progress-bar">
                        <div id="audio-progress-track" class="audio-progress-track">
                            <div id="audio-progress-fill" class="audio-progress-fill"></div>
                            <div id="audio-progress-handle" class="audio-progress-handle"></div>
                        </div>
                    </div>
                    <span id="time-display">0:00 / 0:00</span>
                    <button id="download-btn" class="btn btn-small btn-download" title="下载 MP3">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        下载MP3
                    </button>
                </div>
            </section>

            <!-- Error Display -->
            <div id="error-display" class="error-display hidden">
                <span id="error-message"></span>
                <button id="dismiss-error" class="btn-small">关闭</button>
            </div>
        </main>

        <footer>
            <div class="server-controls">
                <span id="server-status" class="server-status online">● 服务运行中</span>
                <button id="shutdown-btn" class="btn btn-small btn-shutdown">关闭服务</button>
            </div>
            <p class="powered">Powered by FastAPI + Microsoft Edge TTS</p>
        </footer>
    </div>

    <audio id="audio-player" hidden></audio>

    <script src="/static/js/api-client.js"></script>
    <script src="/static/js/audio-player.js"></script>
    <script src="/static/js/file-handler.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
